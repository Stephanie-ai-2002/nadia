<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nadiath Memories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg: #E8E4F3;
      --bg2: #EEE9F8;
      --purple: #7B6CF6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow: hidden;
    }

    /* Blobs de fond */
    .blob { position:fixed; border-radius:50%; filter:blur(70px); pointer-events:none; z-index:0; }
    .b1 { width:500px; height:500px; background:rgba(150,130,255,0.18); top:-120px; right:-100px; }
    .b2 { width:350px; height:350px; background:rgba(200,180,255,0.14); bottom:-90px; left:-80px; }

    /* Lang Switcher */
    .lang-sw {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 300;
      display: flex;
      gap: 5px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      padding: 4px;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .lang-btn {
      padding: 6px 13px;
      border: none;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }
    .lang-btn.active, .lang-btn:hover {
      background: var(--purple);
      color: white;
    }
    @media (max-width: 480px) {
      .lang-sw { top: 12px; right: 12px; }
      .lang-btn { padding: 5px 10px; font-size: 10px; }
    }

    /* Scene 3D */
    .scene {
      perspective: 4200px;
      perspective-origin: 50% 40%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book {
      position: relative;
      width: 1160px;
      height: 680px;
      transform-style: preserve-3d;
      transition: transform 0.4s;
    }

    @media (max-width: 1024px) { .book { width: 920px; height: 560px; } }
    @media (max-width: 768px) { .book { width: 720px; height: 480px; } }
    @media (max-width: 480px) { .book { width: 92vw; height: 460px; } }

    /* Couverture 3D */
    .cover {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1E1248, #2D1B6E, #1A1040);
      border-radius: 14px 45px 30px 14px;
      box-shadow: 20px 25px 60px rgba(0,0,0,0.6),
                  inset 0 0 80px rgba(255,255,255,0.1);
      transform-origin: left center;
      transition: transform 2s cubic-bezier(0.6, 0.05, 0.15, 1);
      z-index: 30;
      cursor: pointer;
      overflow: hidden;
    }

    .book.open .cover {
      transform: rotateY(-172deg);
    }

    /* Pages */
    .pages {
      position: absolute;
      inset: 0;
      display: flex;
      z-index: 10;
    }
    .page {
      width: 50%;
      height: 100%;
      box-shadow: inset 30px 0 40px -20px rgba(0,0,0,0.5);
    }
    .page-left {
      background: var(--bg);
      border-radius: 14px 8px 8px 14px;
    }
    .page-right {
      background: var(--bg2);
      border-radius: 8px 14px 14px 8px;
    }

    /* Contenu */
    .pc { padding: 28px; height: 100%; display: flex; flex-direction: column; }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 28px 28px 0 0;
      padding: 20px;
    }
  </style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<!-- Lang Switcher -->
<div class="lang-sw">
  <button class="lang-btn active" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ru')">RU</button>
</div>

<div class="scene">
  <div id="book" class="book">

    <!-- Pages -->
    <div class="pages">
      <div class="page page-left">
        <div class="pc">
          <h2 style="color:#2D2060; margin-bottom:20px;">Mes Souvenirs</h2>
          <div style="flex:1; display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap;">
            <button onclick="addMedia('photo')" style="width:160px;height:160px;background:white;border-radius:28px;box-shadow:0 10px 30px rgba(0,0,0,0.1);">
              📷<br>Photo
            </button>
            <button onclick="addMedia('video')" style="width:160px;height:160px;background:white;border-radius:28px;box-shadow:0 10px 30px rgba(0,0,0,0.1);">
              🎥<br>Vidéo
            </button>
          </div>
        </div>
      </div>

      <div class="page page-right">
        <div class="pc">
          <input type="text" id="search" placeholder="Rechercher un souvenir..." style="width:100%; padding:12px; border-radius:16px; border:none; margin-bottom:16px;" onkeyup="filterMemories()">
          <div id="memories" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:12px;"></div>
        </div>
      </div>
    </div>

    <!-- Couverture -->
    <div class="cover" onclick="openBook()">
      <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:40px 20px;">
        <h1 style="font-size: clamp(32px, 7vw, 52px); font-weight:700; line-height:1.1;">Nadiath<br><em style="font-weight:300;">Memories</em></h1>
        <p style="margin-top:20px; font-size:18px; opacity:0.9;">Parce que chaque souvenir mérite d’être gardé ❤️</p>
        <button style="margin-top:50px; padding:16px 48px; background:white; color:#2D2060; border:none; border-radius:50px; font-weight:700; font-size:15px;">Ouvrir mon livre</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Nouveau souvenir</h3>
    <input id="title-input" type="text" placeholder="Titre du souvenir..." style="width:100%; padding:14px; margin:15px 0; border-radius:16px; border:1px solid #ddd;">
    <div id="preview" style="height:220px; background:#f8f5ff; border-radius:20px; margin:15px 0; overflow:hidden;"></div>
    <div style="display:flex; gap:12px;">
      <button onclick="closeModal()" style="flex:1; padding:14px; border-radius:16px; background:#f1f1f1;">Annuler</button>
      <button onclick="saveMemory()" style="flex:1; padding:14px; border-radius:16px; background:var(--purple); color:white;">Enregistrer</button>
    </div>
  </div>
</div>

<script>
let memories = JSON.parse(localStorage.getItem('nadiathMemories')) || [];
let currentFile = null;
let currentType = '';

function setLang(l) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
}

function openBook() {
  document.getElementById('book').classList.add('open');
  setTimeout(renderMemories, 800);
}

function addMedia(type) {
  currentType = type;
  document.getElementById('modal-title').textContent = type === 'photo' ? 'Nouvelle Photo' : 'Nouvelle Vidéo';
  document.getElementById('modal').style.display = 'flex';

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = type === 'photo' ? 'image/*' : 'video/*';
  input.onchange = e => {
    currentFile = e.target.files[0];
    if (!currentFile) return;
    const url = URL.createObjectURL(currentFile);
    const preview = document.getElementById('preview');
    preview.innerHTML = currentFile.type.startsWith('image/') 
      ? `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">` 
      : `<video src="${url}" controls style="width:100%; height:100%; object-fit:cover;"></video>`;
  };
  input.click();
}

function saveMemory() {
  if (!currentFile) return alert("Veuillez sélectionner un fichier");
  const title = document.getElementById('title-input').value.trim() || "Souvenir";

  const reader = new FileReader();
  reader.onload = e => {
    memories.unshift({
      id: Date.now(),
      title: title,
      type: currentType,
      url: e.target.result,
      date: new Date().toISOString(),
      favorite: false
    });
    localStorage.setItem('nadiathMemories', JSON.stringify(memories));
    closeModal();
    renderMemories();
  };
  reader.readAsDataURL(currentFile);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('title-input').value = '';
  document.getElementById('preview').innerHTML = '';
  currentFile = null;
}

function renderMemories() {
  const container = document.getElementById('memories');
  container.innerHTML = '';
  memories.forEach(mem => {
    const div = document.createElement('div');
    div.style.cursor = 'pointer';
    div.innerHTML = mem.type === 'photo' 
      ? `<img src="${mem.url}" style="width:100%; border-radius:12px;">` 
      : `<video src="${mem.url}" style="width:100%; border-radius:12px;" muted></video>`;
    div.onclick = () => window.open(mem.url, '_blank');
    container.appendChild(div);
  });
}

function filterMemories() {
  // Peut être amélioré plus tard
  renderMemories();
}

// Init
console.log("%cNadiath Memories chargé avec succès ✨", "color:#7B6CF6; font-weight:bold");
</script>
</body>
</html>
